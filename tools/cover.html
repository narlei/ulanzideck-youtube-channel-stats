<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1600px; height: 800px; overflow: hidden; }
  body {
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    background:
      radial-gradient(900px 620px at 14% 10%, rgba(46,86,170,0.38), transparent 70%),
      linear-gradient(135deg, #0a0e1a, #0d1117);
    color: #fff;
    position: relative;
  }

  .brand { position: absolute; left: 90px; top: 92px; display: flex; align-items: center; gap: 28px; }
  .brand .icon {
    width: 120px; height: 120px; border-radius: 29px;
    filter: drop-shadow(0 0 26px rgba(255,0,51,0.55));
  }
  .brand h1 { font-size: 60px; font-weight: 800; letter-spacing: -1px; }
  .brand .platform { font-size: 26px; font-weight: 600; color: #8b93a7; margin-top: 8px; }

  .headline { position: absolute; left: 90px; top: 330px; }
  .headline .l1, .headline .l2 { font-size: 88px; font-weight: 800; letter-spacing: -2px; line-height: 1.12; }
  .headline .l2 {
    background: linear-gradient(90deg, #3ecf6b 0%, #22d3ee 55%, #4772fa 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .sub { position: absolute; left: 90px; top: 566px; font-size: 32px; font-weight: 500; color: #aeb6c6; }

  .pills { position: absolute; left: 90px; top: 648px; display: flex; gap: 18px; }
  .pill {
    height: 54px; padding: 0 28px; border-radius: 27px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.10);
    color: #d3d8e3; font-size: 28px; font-weight: 600;
    display: flex; align-items: center;
  }

  .deck {
    position: absolute; left: 930px; top: 130px;
    width: 580px; height: 540px;
    background: #141414;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 34px;
    box-shadow: 0 40px 90px rgba(0,0,0,0.55);
    padding: 40px 46px;
  }
  .deck .chrome {
    text-align: center; color: #6d7381; font-size: 26px; font-weight: 700;
    letter-spacing: 8px; margin-bottom: 30px;
  }
  .deck .grid {
    display: grid; grid-template-columns: repeat(4, 108px); grid-template-rows: repeat(3, 108px);
    gap: 18px; justify-content: center;
  }
  .key {
    width: 108px; height: 108px; border-radius: 18px;
    background: #0e0e12; border: 1px solid rgba(255,255,255,0.05);
    overflow: hidden;
  }
  .key img { width: 100%; height: 100%; display: block; }
</style>
</head>
<body>

  <div class="brand">
    <img class="icon" src="../com.narlei.youtubechannelstats.ulanziPlugin/assets/icons/icon.svg">
    <div>
      <h1>YouTube Channel Stats</h1>
      <div class="platform">Ulanzi Deck &middot; macOS &amp; Windows</div>
    </div>
  </div>

  <div class="headline">
    <div class="l1">Your channel, live.</div>
    <div class="l2">Right on your deck.</div>
  </div>
  <div class="sub">Subscribers, views and videos — always live.</div>

  <div class="pills">
    <div class="pill">Channel avatar</div>
    <div class="pill">Daily growth</div>
    <div class="pill">3 themes</div>
  </div>

  <div class="deck">
    <div class="chrome">U &middot; STUDIO</div>
    <div class="grid">
      <div class="key"><img id="k1"></div>
      <div class="key"><img id="k2"></div>
      <div class="key"></div>
      <div class="key"></div>
      <div class="key"></div>
      <div class="key"><img id="k3"></div>
      <div class="key"><img id="k4"></div>
      <div class="key"></div>
      <div class="key"></div>
      <div class="key"></div>
      <div class="key"><img id="k5"></div>
      <div class="key"></div>
    </div>
  </div>

  <script src="../com.narlei.youtubechannelstats.ulanziPlugin/plugin/actions/channelStats.js"></script>
  <script src="./mock.js"></script>
  <script>
    renderKey('#k1', { metric: 'subscribers', theme: 'dark', channel: '@c1' }, null, 1283600);
    renderKey('#k2', { metric: 'views', theme: 'dark', channel: '@c2' });
    renderKey('#k3', { metric: 'subscribers', theme: 'red', channel: '@c3' });
    renderKey('#k4', { metric: 'videos', theme: 'black', channel: '@c4' });
    renderKey('#k5', { metric: 'subscribers', theme: 'dark', channel: '@c5', showAvatar: 'false' });
  </script>
</body>
</html>
